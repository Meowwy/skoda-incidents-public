# Soubor: systems/itls/itls_monitor_diagnostic.yaml
# Popis: Diagnostika pro příznak "Nefunkční výstupy iTLS monitoru"
#
# Rozděleno na dva scénáře (každý vede max k jednomu incidentu).

steps:
  - id: monitor_diagnostic
    type: diagnostic
    question: "Diagnostika: Nefunkční výstupy iTLS monitoru"
    render_if: "system == 'iTLS' && itls_symptom == 'Nefunkční výstupy iTLS monitoru'"
    scenarios:
      # -----------------------------------------
      - title: "Funguje na jiném PC — vada monitoru"
        description: "Zobrazení dat z iTLS funguje na jiném PC — jedná se o vadu monitoru."
        action: "Monitor je vadný. Zajistěte zvýšený monitoring ze strany leitstandu do výměny monitoru."
        resolutions:
          - actual_defect: "Vada monitoru"
            resolver_group: "VYROBNI KZ XX Support SKODA"
            impact: 4
            backup_strategy: "Zvýšený monitoring ze strany leitstandu"

      # -----------------------------------------
      - title: "Nefunguje ani na jiném PC — chyba nastavení"
        description: "Zobrazení dat z iTLS nefunguje na žádném PC ani monitoru — jedná se o chybu nastavení."
        action: "Jedná se o chybu nastavení monitorů. Zajistěte zvýšený monitoring ze strany leitstandu."
        resolutions:
          - actual_defect: "Chyba nastavení monitorů"
            resolver_group: "LOGISTICKE SYSTEMY Support SKODA"
            impact: 4
            backup_strategy: "Zvýšený monitoring ze strany leitstandu"
