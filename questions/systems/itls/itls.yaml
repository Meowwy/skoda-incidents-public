# Soubor: systems/itls/itls.yaml
# Popis: Otázky pro diagnostiku systému iTLS

steps:
  # ------------------------------------------
  # Otázka 1: K čemu se systém používá?
  # ------------------------------------------
  - id: itls_purpose
    type: select
    question: "K čemu se systém iTLS používá?"
    options:
      - "Ekonory (VZV) - SLS"
      - "Tahače - ZLS"
      - "Evidence příjmu materiálu - ELS"
      - "Mobilní light-LOGIS - InLOG@WEB"
      - "Něco jiného / Nevím"
    render_if: "system == 'iTLS'"

  # úniková možnost
  - id: itls_purpose_dead_end
    type: info
    question: "Kontaktujte Leitstanda"
    description: "Tento případ nelze řešit přes tento formulář. Obraťte se na Leitstanda."
    render_if: "system == 'iTLS' && itls_purpose == 'Něco jiného / Nevím'"
    action: stop

  # ------------------------------------------
  # Otázka 2: Jaké zařízení?
  # ------------------------------------------
  - id: itls_device
    type: select
    question: "Jaké zařízení používáte?"
    options:
      - "HDT"
      - "PC"
    render_if: "system == 'iTLS' && itls_purpose != 'Kontaktujte Leitstanda'"

  # ------------------------------------------
  # Otázka 3: Co nefunguje?
  # Položky pod "group" se zobrazí se záhlavím skupiny.
  # ------------------------------------------
  - id: itls_symptom
    type: select
    question: "Co přesně nefunguje?"
    options:
      - "Nefunkční HDT"
      - "Nefunkční tisk"
      - group: "Nefunkční iTLS"
        options:
          - "Nemožnost přihlášení"
          - "Nelze zadat požadovanou hodnotu"
          - "Nefunkční výstupy iTLS monitoru"
          - "Nepřetékají data/zakázky"
          - "Nestandardní chování"
          - "Výpadek systému"
          - "Zablokované pracoviště"
          - "Chyba v rozhraní"
    render_if: "system == 'iTLS' && itls_purpose != 'Kontaktujte Leitstanda'"

  # ==========================================
  # DIAGNOSTICKÉ VĚTVE (podle příznaku "Co nefunguje?")
  # ==========================================

  # Nefunkční HDT — diagnostický strom
  - $include: "itls_hdt_diagnostic.yaml"

  # Nefunkční výstupy iTLS monitoru — diagnostický strom
  - $include: "itls_monitor_diagnostic.yaml"

  # Nestandardní chování HDT — diagnostický strom
  - $include: "itls_nestandardni_diagnostic.yaml"

  # Sdílené obecné diagnostiky
  - $include: "../obecne/obecne_vypadek_systemu.yaml"

  - $include: "../obecne/obecne_nefunkcni_tisk.yaml"

  - $include: "../obecne/obecne_nemoznost_prihlaseni.yaml"

  - $include: "../obecne/obecne_nelze_zadat_hodnotu.yaml"

  - $include: "../obecne/obecne_nepretekaji_data.yaml"

  - $include: "../obecne/obecne_zablokovane_pracoviste.yaml"
