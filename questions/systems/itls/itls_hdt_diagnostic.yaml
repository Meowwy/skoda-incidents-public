# Soubor: systems/itls/itls_hdt_diagnostic.yaml
# Popis: Diagnostika pro příznak "Nefunkční HDT" v systému iTLS
#
# Struktura scénáře:
#   title        — název záložky (co se děje)
#   description  — popis situace (velký text v horní části panelu)
#   action       — doporučená akce / workaround
#   resolutions  — eskalace (prázdné [] = akce samotná problém vyřeší)

steps:
  - id: hdt_diagnostic
    type: diagnostic
    question: "Diagnostika: Nefunkční HDT"
    render_if: "system == 'iTLS' && itls_symptom == 'Nefunkční HDT'"
    scenarios:
      # -----------------------------------------
      - title: "Nefunguje na žádném zařízení"
        description: "iTLS nefunguje na žádném zařízení ve skladu."
        action: "Informujte uživatele o globálním výpadku. Přepněte na záložní závěsky (B závěsky)."
        resolutions:
          - actual_defect: "Globální výpadek SA/VW"
            resolver_group: "LOGISTICKE SYSTEMY Support SKODA"
            impact: 1
            backup_strategy: "Přepnout na B závěsky"

      # -----------------------------------------
      - title: "Nesvítí ikona WIFI"
        description: "Na displeji HDT nesvítí vlevo nahoře ikona WIFI."
        action: "Zařízení nemá síťové připojení. Přepněte na záložní závěsky (B závěsky)."
        resolutions:
          - actual_defect: "Nefunkční WIFI"
            resolver_group: "NETWORK Support SKODA"
            impact: 1
            backup_strategy: "Přepnout na B závěsky"

      # -----------------------------------------
      - title: "Nesvítí ikona baterie"
        description: "Na displeji HDT nesvítí vpravo nahoře ikona stavu baterie."
        action: "Řekněte uživateli, aby vyměnil baterii v HDT."
        resolutions: []

      # -----------------------------------------
      - title: "HDT nejde zapnout"
        description: "Zařízení HDT nejde zapnout."
        action: "Řekněte uživateli, aby zkusil restartovat zařízení podržením tlačítka napájení."
        resolutions:
          - actual_defect: "Nefunkční HDT"
            resolver_group: "VYROBNI KZ XX Support SKODA"
            impact: 4
            backup_strategy: "Restartování"

      # -----------------------------------------
      - title: "HDT nefunguje standardně"
        description: "Zařízení po zapnutí nefunguje standardně."
        action: "Řekněte uživateli, aby podržel červené tlačítko v pravém horním rohu klávesnice pro restart aplikace."
        resolutions:
          - actual_defect: "Nefunkční HDT"
            resolver_group: "VYROBNI KZ XX Support SKODA"
            impact: 4
            backup_strategy: "Držet červené tlačítko v pravém horním rohu klávesnice"

      # -----------------------------------------
      - title: "Nejdou zadávat číslice"
        description: "Na klávesnici HDT svítí tlačítko ALFA — nelze zadávat číslice."
        action: "Stiskněte tlačítko ALFA — přepne klávesnici zpět do numerického režimu."
        resolutions: []

      # -----------------------------------------
      - title: "Certifikát se nespustí"
        description: "Po zapnutí iTLS se nespustí certifikát."
        action: "Zkuste restartovat HDT a spustit iTLS znovu. Pokud certifikát stále nejde, eskalujte."
        resolutions:
          - actual_defect: "Nefunkční HDT"
            resolver_group: "VYROBNI KZ XX Support SKODA"
            impact: 4

      # -----------------------------------------
      - title: "Certifikát proběhl, stále nefunguje"
        description: "Certifikát proběhl správně, ale systém stále nefunguje."
        action: "Potvrďte certifikát tlačítkem OK a znovu se přihlaste do systému iTLS. Incident lze uzavřít."
        resolutions: []
