# Soubor: systems/itls/itls_nestandardni_diagnostic.yaml
# Popis: Diagnostika pro příznak "Nestandardní chování" HDT v systému iTLS

steps:
  - id: nestandardni_diagnostic
    type: diagnostic
    question: "Diagnostika: Nestandardní chování HDT"
    render_if: "system == 'iTLS' && itls_symptom == 'Nestandardní chování'"
    scenarios:
      # -----------------------------------------
      - title: "Opětovné odhlašování"
        description: "Dochází k opakovanému odhlašování uživatele ze systému?"
        ok_answer: "Ne"
        nok_answer: "Ano"
        action: "Zkontrolujte nastavení relace uživatele. Ověřte, zda je správně přiřazený profil."
        resolutions:
          - actual_defect: "Špatně nastaveno"
            resolver_group: "LOGISTICKE SYSTEMY Support SKODA"
            impact: 3

      # -----------------------------------------
      - title: "Odhlašování po novém releasu"
        description: "Došlo v poslední době k aktualizaci / novému releasu iTLS?"
        ok_answer: "Ne"
        nok_answer: "Ano"
        action: "Ověřte, zda se problém týká více uživatelů. Pokud ano, jedná se pravděpodobně o chybu v nové verzi."
        resolutions:
          - actual_defect: "Opakované odhlašování z iTLS"
            resolver_group: "LOGISTICKE SYSTEMY Support SKODA"
            impact: 3

      # -----------------------------------------
      - title: "Nestandardní operace na displeji"
        description: "Zobrazují se na HDT neočekávané operace nebo nesprávná data?"
        ok_answer: "Ne"
        nok_answer: "Ano"
        action: "Řekněte uživateli, aby kontaktoval svého Key usera pro kontrolu a opravu nastavení."
        resolutions:
          - actual_defect: "Špatně nastaveno"
            resolver_group: "Key user"
            impact: 3
