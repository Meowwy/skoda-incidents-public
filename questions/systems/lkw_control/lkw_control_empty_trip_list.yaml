# Soubor: systems/lkw_control/lkw_control_unable_to_login.yaml
# Popis: Diagnostika výpadku telematiky v systému LKW Control

steps:
  - id: trip_diagnostic
    type: diagnostic
    question: "Diagnostika: Prázdný seznam jízd"
    render_if: "lkw_symptom == 'Prázdný seznam jízd'"
    scenarios:
      # -----------------------------------------
      - title: "Vymazání cookies"
        description: "Nejsou promazané cookies z prohlížeče, historie prohlížení a mezipaměť stránek."
        action: "Poraďte uživateli, aby vymazal cookies z prohlížeče."
        resolutions: []

      # -----------------------------------------
      - title: "Filtr pozic"
        description: "Uživatel má zapnutý filtr pozic."
        action: "Uživatel by měl vyplnout filtr na pozice. Kontrola filtru: Řídící stanoviště – Náhled parkovacích míst … - Filtr (vpravo nahoře) položky za Fitr musí být podbarvené modře."
        resolutions: []

      # -----------------------------------------
      - title: "Oprávnění uživatele"
        description: "Uživatel nemá oprávnění."
        action: ""
        resolutions:
          - actual_defect: "Chyné nastavení"
            resolver_group: "LOGISTICKE SYSTEMY Support SKODA"
            impact: 2
            backup_strategy: "Není"
