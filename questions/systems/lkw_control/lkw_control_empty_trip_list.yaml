# Soubor: systems/lkw_control/lkw_control_unable_to_login.yaml
# Popis: Diagnostika výpadku telematiky v systému LKW Control

steps:
  - id: trip_diagnostic
    type: diagnostic
    question: "Diagnostika: Prázdný seznam jízd"
    render_if: "lkw_symptom == 'Prázdný seznam jízd"
    scenarios:
      # -----------------------------------------
      - title: "Vymazání cookies"
        description: "Zkoušel vymazat cookies z prohlížeče, historii prohlížení a mezipaměť stránek?"
        ok_answer: "Ano"
        nok_answer: "Ne"
        action: "Poraďte uživateli, aby vymazal cookies z prohlížeče."
        resolutions:
          - actual_defect: "Chybné nastavení"
            resolver_group: "Uživatel sám"
            impact: 2
            backup_strategy: "Zaškrtnout Vymazat cookies a data stránek při zavření Firefoxu"

      # -----------------------------------------
      - title: "Filtr pozic"
        description: "Má uživatel zepnutý filtr pozic?"
        ok_answer: "Ne"
        nok_answer: "Ano"
        action: "Uživatel by měl vyplnout filtr na pozice."
        resolutions:
          - actual_defect: "Uživatel sám"
            resolver_group: ""
            impact: 2
            backup_strategy: "Kontrola filtru: Řídící stanoviště – Náhled parkovacích míst … - Filtr (vpravo nahoře) položky za Fitr musí být podbarvené modře."

      # -----------------------------------------
      - title: "Oprávnění uživatele"
        description: "Má uživatel oprávnění?"
        ok_answer: "Ano"
        nok_answer: "Ne"
        action: "Uživatel potřebuje oprávnění."
        resolutions:
          - actual_defect: "Chyné nastavení"
            resolver_group: "LOGISTICKE SYSTEMY Support SKODA"
            impact: 2
            backup_strategy: "Není"
