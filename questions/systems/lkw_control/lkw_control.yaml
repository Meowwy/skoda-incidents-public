# File: systems/lkw_control/lkw_control.yaml
# Description: Context and symptom selection for LKW Control

steps:
  - id: lkw_purpose
    type: select
    question: "K čemu se systém používá?"
    options:
      - "Závodová ochrana (kontrola na bráně / v závodě)"
      - "Interní logistika (PLO) - Evidence LKW / Navádění k vykládce nebo nakládce"
      - "Něco jiného / Nevím"
    render_if: "system == 'LKW Control x'"

  # úniková možnost
  - id: lkw_purpose_dead_end
    type: info
    question: "Mimo standardní proces"
    description: "Kontaktujte svého nadřízeného."
    render_if: "system == 'LKW Control x' && lkw_purpose == 'Něco jiného / Nevím'"
    action: stop

  - id: lkw_device
    type: select
    question: "Jaké zařízení používáte?"
    options:
      - "Telematika"
      - "Vlastní mobilní telefon"
      - "HDT"
      - "Systém LKWc"
      - "Syncro Supply Center"
    render_if: "system == 'LKW Control x' && lkw_purpose != 'Něco jiného'"

  - id: lkw_symptom
    type: select
    question: "Co přesně nefunguje?"
    options:
      - "Výpadek telematiky"
      - "Nemožnost přihlášení"
      - "Výpadek systému a chyba v rozhraní"
      - "Prázdný seznam jízd"
      - "Chyba trasy v telematice"
      - "Uživatel má jiné písmo v LKW Control X než jeho kolegové"
      - "Nefunkčnost zadání požadavku na příjezd LKW"
    render_if: "system == 'LKW Control x' && lkw_purpose != 'Něco jiného'"

  # ==========================================
  # DIAGNOSTICKÉ VĚTVE
  # ==========================================

  - $include: "lkw_control_telematics_outage.yaml"

  - $include: "lkw_control_unable_to_login.yaml"

  - $include: "lkw_control_system_outage.yaml"

  - $include: "lkw_control_empty_trip_list.yaml"

  - $include: "lkw_control_different_text.yaml"

  - $include: "lkw_control_arrival_request.yaml"
