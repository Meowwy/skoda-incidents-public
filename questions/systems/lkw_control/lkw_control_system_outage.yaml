# Soubor: systems/lkw_control/lkw_control_unable_to_login.yaml
# Popis: Diagnostika výpadku telematiky v systému LKW Control

steps:
  - id: outage_diagnostic
    type: diagnostic
    question: "Diagnostika: Výpadek systému a chyba v rozhraní"
    render_if: "lkw_symptom == 'Výpadek systému a chyba v rozhraní'"
    scenarios:
      # -----------------------------------------
      - title: "Přihlašovací formulář"
        description: "Přihlašovací formulář pro vyplnění UserID se nezobrazuje."
        action: "Zkontrolujte, zda je výpadek ecidován i v jiných závodech. Pokud ne, zadejte požadavek na řešitelskou skupinu viz níže."
        resolutions:
          - actual_defect: "Chybné nastavení"
            resolver_group: "LOGISTICKE SYSTEMY Support SKODA"
            impact: 2
            backup_strategy: ""

      # -----------------------------------------
      - title: "Data v LKW Control"
        description: "Do LKW Control nepřitékají data."
        action: ""
        resolutions:
          - actual_defect: "Chyba v rozhraní"
            resolver_group: "nedefinováno"
            impact: 2
            backup_strategy: ""
