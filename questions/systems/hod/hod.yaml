# Soubor: systems/hod/hod.yaml
# Popis: Otázky pro diagnostiku systému HOD (Handheld Order Dispatch)

steps:
  # ------------------------------------------
  # Otázka 1: K čemu se systém používá?
  # ------------------------------------------
  - id: hod_purpose
    type: select
    question: "K čemu se HOD používá?"
    options:
      - "Příjem zboží"
      - "Vyskladnění"
      - "Inventura"
      - "Něco jiného / Nevím"
    render_if: "system == 'HOD'"

  # Úniková možnost
  - id: hod_purpose_dead_end
    type: info
    question: "Mimo standardní proces"
    description: "Kontaktujte svého nadřízeného."
    render_if: "system == 'HOD' && hod_purpose == 'Něco jiného / Nevím'"
    action: stop

  # ------------------------------------------
  # Otázka 2: Jaké zařízení?
  # ------------------------------------------
  - id: hod_device
    type: select
    question: "Jaké zařízení používáte?"
    options:
      - "Ruční terminál (HHT)"
      - "Tablet"
      - "PC stanice"
    render_if: "system == 'HOD' && hod_purpose != 'Něco jiného'"

  # ------------------------------------------
  # Otázka 3: Co přesně nefunguje?
  # ------------------------------------------
  - id: hod_symptom
    type: select
    question: "Co přesně nefunguje?"
    options:
      - "Aplikace se nespustí"
      - "Chyba při skenování"
      - "Ztráta připojení"
      - "Nesprávná data"
    render_if: "system == 'HOD' && hod_purpose != 'Něco jiného'"

  # ==========================================
  # DIAGNOSTICKÉ VĚTVE
  # ==========================================
  - $include: "hod_pripojeni_diagnostic.yaml"
  - $include: "hod_aplikace_diagnostic.yaml"
  - $include: "hod_skenovani_diagnostic.yaml"
  - $include: "hod_data_diagnostic.yaml"
