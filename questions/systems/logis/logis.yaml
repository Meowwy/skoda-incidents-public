# Soubor: systems/logis/logis.yaml
# Popis: Otázky pro diagnostiku systému LOGIS (CICSJ)

steps:
  # ------------------------------------------
  # Otázka 1: K čemu se systém používá?
  # ------------------------------------------
  - id: logis_purpose
    type: select
    question: "K čemu se systém LOGIS používá?"
    options:
      - "Přehled pohybu a stavu zásob"
      - "Evidence příjmu materiálu"
      - "Evidence výdeje materiálu"
      - "Centralizace požadavků na výdej"
      - "Komunikace s iTLS"
      - "Komunikace s WMS"
      - "Něco jiného / Nevím"
    render_if: "system == 'LOGIS'"

  # úniková možnost
  - id: logis_purpose_dead_end
    type: info
    question: "Mimo standardní proces"
    description: "Kontaktujte svého nadřízeného."
    render_if: "system == 'LOGIS' && logis_purpose == 'Něco jiného / Nevím'"
    action: stop

  # ------------------------------------------
  # Otázka 2: Jaké zařízení?
  # ------------------------------------------
  - id: logis_device
    type: select
    question: "Jaké zařízení používáte?"
    options:
      - "Logistická tiskárna"
      - "HDT"
      - "PC"
      - "Něco jiného / Nevím"
    render_if: "system == 'LOGIS' && logis_purpose != 'Něco jiného / Nevím'"

  # ------------------------------------------
  # Otázka 3: Co přesně nefunguje?
  # ------------------------------------------
  - id: logis_symptom
    type: select
    question: "Co přesně nefunguje?"
    options:
      - "Nefunkční LOGIS / CICSJ"
      - "Výpadek systému"
      - "Nepřetékají data"
      - "Nemožnost přihlášení"
      - "Zablokované pracoviště"
      - "Obecná chyba HOD (Host On-Demand)"
      - "Nefunkční tisk"
      - "Něco jiného / Nevím"
    render_if: "system == 'LOGIS' && logis_purpose != 'Něco jiného / Nevím'"

  # ==========================================
  # DIAGNOSTICKÉ VĚTVE
  # ==========================================

  # Nefunkční LOGIS / CICSJ — diagnostický strom
  - $include: "logis_nefunkcni_diagnostic.yaml"

  # Sdílené obecné diagnostiky
  - $include: "../obecne/obecne_vypadek_systemu.yaml"

  - $include: "../obecne/obecne_nepretekaji_data.yaml"

  - $include: "../obecne/obecne_nemoznost_prihlaseni.yaml"

  - $include: "../obecne/obecne_zablokovane_pracoviste.yaml"

  - $include: "../obecne/obecne_klient_hod.yaml"

  - $include: "../obecne/obecne_nefunkcni_tisk.yaml"
