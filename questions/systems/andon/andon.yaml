# Soubor: systems/andon/andon.yaml
# Popis: Otázky pro diagnostiku systému ANDON

steps:
  # ------------------------------------------
  # Otázka 1: K čemu se systém používá?
  # ------------------------------------------
  - id: andon_purpose
    type: select
    question: "K čemu se systém ANDON používá?"
    options:
      - "Odvolávání materiálu na lince"
      - "Odvolávání materiálu na svářenských věžích"
      - "Odvolávání materiálu"
      - "Něco jiného / Nevím"
    render_if: "system == 'ANDON'"

  # úniková možnost
  - id: andon_purpose_dead_end
    type: info
    question: "Mimo standardní proces"
    description: "Kontaktujte svého nadřízeného."
    render_if: "system == 'ANDON' && andon_purpose == 'Něco jiného / Nevím'"
    action: stop

  # ------------------------------------------
  # Otázka 2: Jaké zařízení?
  # ------------------------------------------
  - id: andon_device
    type: select
    question: "Jaké zařízení používáte?"
    options:
      - "HDT / PC"
      - "Tiskárna"
      - "Něco jiného / Nevím"
    render_if: "system == 'ANDON' && andon_purpose != 'Něco jiného / Nevím'"

  # ------------------------------------------
  # Otázka 3: Co přesně nefunguje?
  # ------------------------------------------
  - id: andon_symptom
    type: select
    question: "Co přesně nefunguje?"
    options:
      - "HW"
      - "SW"
      - "Něco jiného / Nevím"
    render_if: "system == 'ANDON' && andon_purpose != 'Něco jiného / Nevím'"

  # ==========================================
  # DIAGNOSTICKÉ VĚTVE
  # ==========================================

  - $include: "andon_hw_diagnostic.yaml"

  - $include: "andon_sw_diagnostic.yaml"
