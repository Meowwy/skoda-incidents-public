# File: main.yaml
# Description: The main entry point for the ITSM Triage Wizard
# Note: Area, Sub-area, Location, and Warehouse selection is handled by the dashboard UI.
# The YAML schema starts from system selection onwards.
version: 1.0

steps:
  # 1. Kdo nahlašuje? (Automatically fetched, e.g., from AD)
  - id: user_id
    type: hidden
    source: active_directory

  # 2. Jaký systém? (Which system?)
  - id: system
    type: select
    question: "Jaký systém má výpadek?"
    options:
      - "ANDON"
      - "IMIS"
      - "WMS KAKL"
      - "WMS MAKL"
      - "WMS U6A"
      - "WMS U6C"
      - "LKW Control x"
      - "HOD"
      - "iTLS"
      - "LOGIS"
      - "INEAS-BMA"
      - "INEAS-MA"

  # ==========================================
  # SYSTEM INCLUDES
  # ==========================================

  # LKW Control branch
  - $include: "./systems/lkw_control/lkw_control.yaml"

  # HOD branch (mock)
  - $include: "./systems/hod/hod.yaml"
