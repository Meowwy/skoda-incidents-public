# Popis: Hlavní vstupní bod
# Poznámka: Oblast (area), podoblast (sub-area), lokace (location), a sklady (warehouse) výběr je přes UI.
# V YAML schématech jsou definované otázky od kategoritace systému dále.
version: 1.0

steps:
  # 1. Kdo nahlašuje a odkud se nahlašuje? (vezme se automaticky z AD, hala se vybírá z warehouses.yaml)
  - id: user_id
    type: hidden
    source: active_directory

  # 2. Jaký systém?
  - id: system
    type: select
    question: "Jaký systém má výpadek?"
    options:
      - "ANDON"
      - "IMIS"
      - "WMS KAKL"
      - "WMS MAKL"
      - "WMS U6A"
      - "WMS U6C"
      - "LKW Control x"
      - "HOD"
      - "iTLS"
      - "LOGIS"
      - "INEAS-BMA"
      - "INEAS-MA"

  # ==========================================
  # SYSTEM INCLUDES
  # ==========================================

  # LKW Control branch
  - $include: "./systems/lkw_control/lkw_control.yaml"

  # iTLS branch
  - $include: "./systems/itls/itls.yaml"

  # HOD branch (mock)
  - $include: "./systems/hod/hod.yaml"
